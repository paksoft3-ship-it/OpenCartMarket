<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0a20"/>
      <stop offset="100%" stop-color="#1a1535"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6000"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Glow orb -->
  <circle cx="400" cy="250" r="180" fill="#ff6000" opacity="0.06" filter="url(#glow)"/>

  <!-- Center card -->
  <rect x="120" y="100" width="560" height="330" rx="16" fill="#0d1117" stroke="#ff6000" stroke-width="1.5" opacity="0.9"/>

  <!-- XML Feed visual -->
  <!-- Top bar with marketplace brand colour -->
  <rect x="120" y="100" width="560" height="48" rx="16" fill="url(#barGrad)"/>
  <rect x="120" y="132" width="560" height="16" fill="url(#barGrad)"/>

  <!-- Marketplace name -->
  <text x="400" y="132" fill="white" font-size="18" font-weight="bold" text-anchor="middle" font-family="sans-serif" letter-spacing="1">Trendyol</text>

  <!-- XML rows simulating product feed -->
  <text x="148" y="172" fill="#ff6000" font-size="9" font-family="monospace">&lt;products&gt;</text>
  
  <text x="165" y="190" fill="#4b5563" font-size="9" font-family="monospace">&lt;item&gt;</text>
  <rect x="182" y="197" width="180" height="6" rx="3" fill="#ff6000" opacity="0.7"/>
  <rect x="182" y="208" width="120" height="4" rx="2" fill="#1e293b"/>
  <rect x="182" y="216" width="90" height="4" rx="2" fill="#1e293b"/>
  <text x="165" y="225" fill="#4b5563" font-size="9" font-family="monospace">&lt;/item&gt;</text>
  <text x="165" y="240" fill="#4b5563" font-size="9" font-family="monospace">&lt;item&gt;</text>
  <rect x="182" y="247" width="200" height="6" rx="3" fill="#ff8c00" opacity="0.5499999999999999"/>
  <rect x="182" y="258" width="135" height="4" rx="2" fill="#1e293b"/>
  <rect x="182" y="266" width="100" height="4" rx="2" fill="#1e293b"/>
  <text x="165" y="275" fill="#4b5563" font-size="9" font-family="monospace">&lt;/item&gt;</text>
  <text x="165" y="290" fill="#4b5563" font-size="9" font-family="monospace">&lt;item&gt;</text>
  <rect x="182" y="297" width="220" height="6" rx="3" fill="#ff8c00" opacity="0.39999999999999997"/>
  <rect x="182" y="308" width="150" height="4" rx="2" fill="#1e293b"/>
  <rect x="182" y="316" width="110" height="4" rx="2" fill="#1e293b"/>
  <text x="165" y="325" fill="#4b5563" font-size="9" font-family="monospace">&lt;/item&gt;</text>
  <text x="148" y="382" fill="#ff6000" font-size="9" font-family="monospace">&lt;/products&gt;</text>

  <!-- Arrow icon -->
  <circle cx="680" cy="265" r="22" fill="#ff6000" opacity="0.15" stroke="#ff6000" stroke-width="1"/>
  <text x="680" y="273" fill="#ff6000" font-size="18" font-weight="bold" text-anchor="middle" font-family="sans-serif">→</text>

  <!-- Stats bar -->
  <rect x="120" y="430" width="560" height="55" fill="#161b22"/>
  <text x="180" y="452" fill="#6b7280" font-size="9" font-family="sans-serif">Products synced</text>
  <text x="180" y="470" fill="#ff6000" font-size="14" font-weight="bold" font-family="sans-serif">Auto</text>
  <text x="340" y="452" fill="#6b7280" font-size="9" font-family="sans-serif">Format</text>
  <text x="340" y="470" fill="#ff8c00" font-size="14" font-weight="bold" font-family="sans-serif">XML</text>
  <text x="500" y="452" fill="#6b7280" font-size="9" font-family="sans-serif">Install</text>
  <text x="500" y="470" fill="#fcd34d" font-size="14" font-weight="bold" font-family="sans-serif">OCMOD</text>

  <!-- Label area -->
  <rect x="0" y="525" width="800" height="75" fill="#1a1535"/>
  <rect x="0" y="525" width="800" height="3" fill="#ff6000"/>

  <text x="30" y="552" fill="#fefce8" font-size="21" font-weight="bold" font-family="sans-serif">Trendyol XML Feed</text>

  <rect x="680" y="535" width="90" height="30" rx="6" fill="#ff6000"/><text x="725" y="556" fill="white" font-size="14" font-weight="bold" text-anchor="middle" font-family="sans-serif">$9.99</text>

  <rect x="30" y="562" width="60" height="16" rx="4" fill="#ff6000" opacity="0.15"/>
  <text x="60" y="574" fill="#ff6000" font-size="9" font-weight="bold" text-anchor="middle" font-family="sans-serif">XML FEED</text>
</svg>