<!DOCTYPE html>

<html lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#5c6cff",
              "background-light": "#f5f6f8",
              "background-dark": "#0f1123",
            },
            fontFamily: {
              "display": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .glass-morphism {
            backdrop-filter: blur(8px);
            background-color: rgba(15, 17, 35, 0.4);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen font-display">
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 glass-morphism">
<!-- Modal Card -->
<div class="bg-white dark:bg-slate-900 w-full max-w-[520px] rounded-xl shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-800">
<!-- Header -->
<div class="px-8 pt-8 pb-4 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">account_balance_wallet</span>
</div>
<div>
<h2 class="text-xl font-bold text-slate-900 dark:text-slate-100 leading-tight">Ödeme Talebi Oluştur</h2>
<p class="text-sm text-slate-500 dark:text-slate-400">Kazançlarınızı güvenle çekin</p>
</div>
</div>
<button class="text-slate-400 hover:text-slate-600 transition-colors p-2 rounded-full hover:bg-slate-100">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Content Container -->
<div class="px-8 py-4 space-y-6">
<!-- Balance Info -->
<div class="bg-primary/5 border border-primary/10 rounded-xl p-4 flex items-center justify-between">
<span class="text-sm font-medium text-slate-600 dark:text-slate-300">Çekilebilir Bakiye</span>
<span class="text-lg font-bold text-primary">₺12.450,00</span>
</div>
<!-- Amount Input Section -->
<div class="space-y-3">
<div class="flex justify-between items-end">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-200">Çekilecek Tutar</label>
<button class="text-xs font-bold text-primary hover:underline">Tümünü Çek</button>
</div>
<div class="relative">
<span class="absolute left-5 top-1/2 -translate-y-1/2 text-2xl font-bold text-slate-400">₺</span>
<input class="w-full bg-slate-50 dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 rounded-xl py-5 pl-12 pr-6 text-3xl font-bold text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-0 transition-all placeholder:text-slate-300" placeholder="0,00" type="text"/>
</div>
</div>
<!-- Bank Selection -->
<div class="space-y-3">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-200">Kayıtlı Banka Hesabı</label>
<div class="relative group cursor-pointer">
<input checked="" class="hidden peer" id="bank1" name="bank" type="radio"/>
<label class="flex items-center gap-4 p-4 rounded-xl border-2 border-primary bg-primary/5 transition-all peer-checked:border-primary peer-checked:bg-primary/5 cursor-pointer" for="bank1">
<div class="w-12 h-12 rounded-lg bg-white flex items-center justify-center border border-slate-200 overflow-hidden">
<img class="w-10 h-10 object-contain" data-alt="Turkish Bank Logo Minimalist" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA5ZC2GD_9e9imem00XxYaqRY9mVbEkoUYTd1GtQSGkf527LSrp3cDn7o7y1Egq9Ka0OMOzCyfTSzb8aRWyCBf4je0aVr0OM3u-shoCh7J0i90x7hMhGRYQob5sZxK-PTIraoI5a1PIMkHSIEm7Utx-Nzg_Xx4rV4W_VDxp4JZqlRQZvYl8azYeEyU1nVfTXwaJRC7UqGRHUnT2U3cHIgfu-hUa640KBEfllPGSim9Qx_DOLLrlvitWgRzkhJKSo2wfxaqcG9LMXY8"/>
</div>
<div class="flex-1">
<p class="text-sm font-bold text-slate-900 dark:text-slate-100">Türkiye İş Bankası</p>
<p class="text-xs text-slate-500 dark:text-slate-400">TR** **** **** **** **** **42 10</p>
<p class="text-xs font-medium text-slate-400 mt-0.5">Ahmet Yılmaz</p>
</div>
<div class="text-primary">
<span class="material-symbols-outlined">check_circle</span>
</div>
</label>
</div>
</div>
<!-- Fee Breakdown -->
<div class="border-t border-dashed border-slate-200 dark:border-slate-700 pt-4 space-y-2">
<div class="flex justify-between text-sm">
<span class="text-slate-500 dark:text-slate-400">İşlem Ücreti</span>
<span class="text-slate-900 dark:text-slate-100 font-medium">₺0,00</span>
</div>
<div class="flex justify-between text-base font-bold">
<span class="text-slate-900 dark:text-slate-100">Net Alacağınız</span>
<span class="text-primary">₺0,00</span>
</div>
</div>
<!-- Security Note -->
<div class="flex items-center justify-center gap-2 py-1 bg-slate-50 dark:bg-slate-800/50 rounded-lg">
<span class="material-symbols-outlined text-sm text-slate-400">lock</span>
<span class="text-[11px] font-medium text-slate-500 uppercase tracking-wider">Bu işlem 2FA ile korunmaktadır</span>
</div>
</div>
<!-- Actions -->
<div class="px-8 pb-8 pt-2 flex flex-col gap-3">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
<span>Talebi Gönder</span>
<span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
<button class="w-full bg-transparent hover:bg-slate-50 dark:hover:bg-slate-800 text-slate-500 dark:text-slate-400 font-semibold py-3 rounded-xl transition-all">
                    Vazgeç
                </button>
</div>
</div>
</div>
<!-- Background Mock (Contextual behind the modal) -->
<div class="px-40 py-10 opacity-20 pointer-events-none select-none">
<header class="flex items-center justify-between border-b border-solid border-slate-200 pb-5">
<div class="flex items-center gap-8">
<div class="flex items-center gap-4 text-slate-900">
<div class="size-6 bg-primary rounded-md"></div>
<h2 class="text-lg font-bold">OpenCart Marketplace</h2>
</div>
</div>
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-slate-200"></div>
</div>
</header>
<div class="mt-10 grid grid-cols-3 gap-6">
<div class="h-40 bg-white rounded-xl"></div>
<div class="h-40 bg-white rounded-xl"></div>
<div class="h-40 bg-white rounded-xl"></div>
</div>
</div>
</body></html>
